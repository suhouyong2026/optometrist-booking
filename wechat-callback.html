<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信授权中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .loading-container {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">微信授权中...</div>
        <div class="loading-subtext">请稍候，正在获取用户信息</div>
    </div>

    <script>
        const API_BASE_URL = 'https://suhouyong2026-5gq178it64857137-1404541376.ap-shanghai.app.tcloudbase.com';
        
        // 从 URL 获取 code 参数
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (!code) {
            alert('授权失败，请重试');
            window.location.href = '/';
        } else {
            // 调用云函数处理授权
            handleWechatAuth(code);
        }
        
        async function handleWechatAuth(code) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/wechat/callback?code=${code}`);
                const result = await response.json();
                
                if (result.success) {
                    // 保存用户信息
                    localStorage.setItem('customerUser', JSON.stringify(result.user));
                    // 跳转回首页
                    window.location.href = '/?openid=' + result.user.openid + '&wechat_login=1';
                } else {
                    alert('授权失败：' + result.message);
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('授权处理失败:', error);
                alert('授权处理失败，请重试');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
